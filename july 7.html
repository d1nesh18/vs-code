<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video Examples</title>
</head>
<body>

    <h1>HTML Audio and Video Tags</h1>

    <section>
        <h2>Audio Examples</h2>

        <div>
            <h3>1. Basic Audio</h3>
            <audio controls>
                <source src="images/sigmamusicart-no-copyright-music-537751.mp3" type="">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div>
            <h3>2. Audio with Autoplay</h3>
            <audio controls autoplay>
                <source src="images/sigmamusicart-no-copyright-music-537751.mp3" type="">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div>
            <h3>3. Audio with Loop</h3>
            <audio controls loop>
                <source src="images/sigmamusicart-no-copyright-music-537751.mp3" type="">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div>
            <h3>4. Audio with Muted</h3>
            <audio controls muted>
                <source src="images/sigmamusicart-no-copyright-music-537751.mp3" type="">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div>
            <h3>5. Audio with Preload None</h3>
            <audio controls preload="none">
                <source src="images/sigmamusicart-no-copyright-music-537751.mp3" type="">
                Your browser does not support the audio element.
            </audio>
        </div>

    </section>

    <hr>

    <section>
        <h2>Video Examples</h2>

        <div>
            <h3>1. Basic Video</h3>
            <video width="320" height="240" controls>
                <source src="images/00000389-VIDEO-2024-01-28-22-06-12.mp4" type="">
                Your browser does not support the video tag.
            </video>
        </div>

        <div>
            <h3>2. Video with Autoplay</h3>
            <video width="320" height="240" controls autoplay>
                <source src="images/00000389-VIDEO-2024-01-28-22-06-12.mp4" type="">
                Your browser does not support the video tag.
            </video>
        </div>

        <div>
            <h3>3. Video with Loop</h3>
            <video width="320" height="240" controls loop>
                <source src="images/00000389-VIDEO-2024-01-28-22-06-12.mp4" type="">
                Your browser does not support the video tag.
            </video>
        </div>

        <div>
            <h3>4. Video with Muted</h3>
            <video width="320" height="240" controls muted>
                <source src="images/00000389-VIDEO-2024-01-28-22-06-12.mp4" type="">
                Your browser does not support the video tag.
            </video>
        </div>

        <div>
            <h3>5. Video with Poster</h3>
            <video width="320" height="240" controls poster="images/rb21.jpg">
                <source src="images/00000389-VIDEO-2024-01-28-22-06-12.mp4" type="">
                Your browser does not support the video tag.
            </video>
        </div>

    </section>

</body>
</html>
