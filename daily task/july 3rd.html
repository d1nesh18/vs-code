<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image tags</title>
</head>
<body>
    <center>
    <img src="../daily task/images/images.png"  height="20%" width="20%">
    <h1>
     Image tags
    </h1>
    </center>

    <br><hr><br>

    <img src="../vizag.jpg" alt="vizag" width="100%" height="750">
    <img src="" alt="Vizag">

    <br><hr><br>

    <h1>Image source</h1>
    <br>    
    <h3>local images</h3>
    <img src="../daily task/images/3jly1.jpg" alt="" width="100%">
    <hr>
    <h3>External images</h3>
    <img src="https://i.pinimg.com/1200x/95/f1/e0/95f1e0ec6e2765d68a36cbe91a6001fc.jpg" alt="1" height="40%" width="35%">
    
    <br><hr><br>

    <h3>Image styling</h3>
    <img src="../vizag.jpg" alt="" style="height: auto; width: auto; border-radius: 15px;">
    
    <br><hr><br>

    <h3>Image as a link</h3>
    <br>
    <a href="https://theoppty.com/" target="_blank"><img src="../daily task/images/slider-3-image.png"></a>
    
    <br><hr><br>

    <h3>responsive images</h3>
    <img src="../daily task/images/rb21.jpg" alt="rb21" style="max-width: 100%; height: 85%;">
</body>
</html>
